# Semantica layout: interactive city scene

name: Semantica

tokens:
  viewport:
    min: 320
    max: 1240
  typography:
    base:
      min: 18
      max: 20
    scale:
      min: 1.2
      max: 1.25
    steps:
      above: 5
      below: 2
  spacing:
    negative: [0.75, 0.5, 0.25]
    positive: [1.5, 2, 3, 4, 6]
    pairs: [s-l]

css:
  - _core/reset.css
  - _core/syntax.css
  - _core/compositions/flow.css
  - _core/compositions/grid.css
  - semantica/global/variables.css
  - semantica/global/global-styles.css
  - semantica/blocks/*

highlights:
  default:
    scheme: crt
    mode: dark
  schemes:
    - crt.light
    - crt.dark
    - borland.light
    - borland.dark
  css: true
  js: true
