# Solarized colour scheme

light:
  meta:
    name: Solarized Light
    html: Solarized Light
  palette:
    base03:  '#002b36'
    base02:  '#073642'
    base01:  '#586e75'
    base00:  '#657b83'
    base0:   '#839496'
    base1:   '#93a1a1'
    base2:   '#eee8d5'
    base3:   '#fdf6e3'
    yellow:  '#b58900'
    orange:  '#cb4b16'
    red:     '#dc322f'
    magenta: '#d33682'
    violet:  '#6c71c4'
    blue:    '#268bd2'
    cyan:    '#2aa198'
    green:   '#859900'
  styles:
    text:
      primary:   base00
      secondary: base1
      emphasis:  base01
      heading:   orange
      link:      blue
      visited:   violet
      hover:     cyan
    background:
      primary:   base3
      secondary: base2
      embed:     base02
  syntax:
    keyword:     green
    string:      cyan
    comment:     base1
    function:    blue
    type:        yellow
    number:      magenta
    operator:    base00
    constant:    cyan
    variable:    base00
    punctuation: base00

