    green:   '#60ac39'
    cyan:    '#1fad83'
    blue:    '#6684e1'
    purple:  '#b854d4'
    magenta: '#d43552'
  styles:
    text:
      primary:   fg3
      secondary: bg2
      emphasis:  fg2
      heading:   orange
      link:      blue
      visited:   purple
      hover:     cyan
    background:
      primary:   bg0
      secondary: bg1
      embed:     fg1
