# Dune (Atelier Dune) colour scheme

light:
  meta:
    name: Dune Light
    html: Dune Light
  palette:
    bg0:     '#fefbec'
    bg1:     '#e8e4cf'
    bg2:     '#a6a28c'
    bg3:     '#999580'
    fg3:     '#7d7a68'
