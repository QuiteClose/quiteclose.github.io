# Gruvbox colour scheme

light:
  meta:
    name: Gruvbox Light
    html: Gruvbox Light
  palette:
    bg0:    '#f9f5d7'
    bg1:    '#ebdbb2'
    bg2:    '#d5c4a1'
    bg3:    '#bdae93'
    fg3:    '#665c54'
    fg2:    '#504945'
    fg1:    '#3c3836'
    fg0:    '#282828'
    gray:   '#928374'
    red:    '#9d0006'
    green:  '#79740e'
    yellow: '#b57614'
    blue:   '#076678'
    purple: '#8f3f71'
    aqua:   '#427b58'
    orange: '#af3a03'
  styles:
    text:
      primary:   fg3
      secondary: bg3
      emphasis:  fg2
      heading:   orange
      link:      blue
      visited:   purple
      hover:     aqua
    background:
      primary:   bg0
      secondary: bg1
      embed:     fg1
  syntax:
    keyword:     red
    string:      green
    comment:     gray
    function:    aqua
    type:        yellow
    number:      purple
    operator:    fg3
    constant:    purple
    variable:    fg3
    punctuation: fg3

