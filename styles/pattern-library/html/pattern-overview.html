<x-extend template="pattern-library.html">

<link rel="stylesheet" x-var:href="page.layout_css" />
<link rel="stylesheet" href="/css/patterns.css" />
</x-define>
<x-define slot="content">
<p>Pattern library for the <strong><x-var name="page.layout_display_name" /></strong> layout.</p>
<x-if var="page.has_tokens">
<h2>Token Configuration</h2>
<ul>
<li><strong>Viewport:</strong> <x-var name="page.viewport_min" />px &ndash; <x-var name="page.viewport_max" />px</li>
</ul>

<p>Default: <strong><x-var name="page.default_scheme" /></strong> (<x-var name="page.default_mode" />)</p>

<x-if var="page.has_css">
<h2>CSS Files</h2>
<ul>
<x-for file in overview.css_files>

</x-for>
</ul>

</x-extend>
