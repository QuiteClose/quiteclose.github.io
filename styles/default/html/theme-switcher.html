<div class="theme-switcher" id="theme-switcher">
<div class="theme-switcher__controls">
<label class="theme-switcher__toggle" title="Toggle dark mode">
<input type="checkbox" id="dark-mode-toggle" aria-label="Dark mode">
<span class="slider"></span>
<span class="icon icon-light" aria-hidden="true">☀</span>
<span class="icon icon-dark" aria-hidden="true">☾</span>
</label>
<button type="button" class="theme-switcher__expand" id="theme-drawer-toggle" aria-label="Choose colour scheme" aria-expanded="false">
<span></span><span></span><span></span>
<span></span><span></span><span></span>
<span></span><span></span><span></span>
</button>
</div>
<div class="theme-switcher__drawer" id="theme-drawer" role="region" aria-label="Colour schemes">
<ul role="list" id="theme-list"></ul>
</div>
</div>
