<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    <title>{{ page.title }} - {{ site.title }}</title>
    <link rel="stylesheet" href="{{ "/assets/css/default.css" | relative_url }}">
  </head>
  <body>
    <div id="dark-mode-toggle">
      <label class="switch">
        <input id="dark-mode-checkbox" type="checkbox" onchange="toggleDarkMode()">
        <span class="slider round"></span>
      </label>
      <script>
function loadDarkMode() {
    var body = document.body;
    var checkbox = document.getElementById("dark-mode-checkbox");
    var darkMode = localStorage.getItem("darkMode");
    if (darkMode == "true") {
        checkbox.checked = true;
        body.classList.add("dark-mode");
    }
}
function toggleDarkMode() {
    var element = document.body;
    element.classList.toggle("dark-mode");
    if (element.classList.contains("dark-mode")) {
        localStorage.setItem("darkMode", "true");
    } else {
        localStorage.setItem("darkMode", "false");
    }
}
loadDarkMode();
      </script>
    </div>
    <header>
      <h1>{{ site.title }}</h1>
      <nav>
        <ul>
          <li><a href="{{ "/" | relative_url }}">Home</a></li>
          <li><a href="{{ "/about" | relative_url }}">About</a></li>
        </ul>
      </nav>
    </header>
    <main id="content">
    {{ content }}
    </main>
    <footer>
        <p>&copy; {{ site.time | date: "%Y" }} <a href="https://github.com/QuiteClose">@QuiteClose</a></p>
    </footer>
  </body>
</html>
